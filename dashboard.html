<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sharexpense</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .sidebar-item { @apply flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 rounded-xl transition-all cursor-pointer; }
        .sidebar-item.active { @apply text-white bg-indigo-600 shadow-lg shadow-indigo-500/20; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        
        #authOverlay {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex overflow-x-hidden">

    <!-- Mandatory Auth Guard Overlay -->
    <div id="authOverlay">
        <div class="text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mx-auto"></div>
            <p class="mt-4 text-gray-500 font-medium animate-pulse">Verifying access...</p>
        </div>
    </div>

    <!-- Sidebar -->
    <aside class="hidden lg:flex w-64 bg-gray-900 text-white flex-col p-6 sticky top-0 h-screen">
        <div class="flex items-center gap-3 mb-10 px-2">
            <div class="bg-indigo-600 p-2 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            </div>
            <h1 class="text-xl font-bold tracking-tight">Sharexpense</h1>
        </div>

        <nav class="flex-grow space-y-2">
            <div class="sidebar-item active">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                <span>Overview</span>
            </div>
            <div class="sidebar-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span>Profile</span>
            </div>
            <div class="sidebar-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span>Room</span>
            </div>
            <div class="sidebar-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1-2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                <span>Settings</span>
            </div>
        </nav>

        <div class="pt-6 border-t border-gray-800">
            <button onclick="window.logoutUser()" class="sidebar-item w-full text-red-400 hover:bg-red-950/30 hover:text-red-300">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                <span>Log out</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-grow p-4 md:p-8 w-full max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
            <div>
                <h2 class="text-3xl font-bold text-gray-800" id="welcomeUser">Hello!</h2>
                <p class="text-gray-500">Track and manage your daily spending.</p>
            </div>
            <div class="flex items-center gap-4 w-full md:w-auto">
                <button onclick="document.getElementById('modal').classList.remove('hidden')" class="flex-grow md:flex-none bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add Expense
                </button>
                <div class="w-12 h-12 rounded-2xl bg-white shadow-sm border border-gray-100 flex items-center justify-center overflow-hidden">
                    <img id="userImg" src="" alt="Profile" class="hidden w-full h-full object-cover">
                    <span id="userInitials" class="text-indigo-600 font-bold text-lg uppercase">?</span>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Analysis Chart -->
            <div class="lg:col-span-4 glass-card p-8 rounded-[2rem] shadow-sm flex flex-col">
                <h3 class="font-bold text-gray-800 text-lg mb-6">Spending Analysis</h3>
                <div class="relative flex-grow min-h-[250px]">
                    <canvas id="expenseChart"></canvas>
                </div>
                <div id="chartLegend" class="mt-8 space-y-3">
                    <!-- Dynamic legend -->
                </div>
            </div>

            <!-- Transactions Table -->
            <div class="lg:col-span-8 glass-card p-8 rounded-[2rem] shadow-sm">
                <h3 class="font-bold text-gray-800 text-lg mb-6">Recent Expenses</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-gray-400 text-[10px] uppercase tracking-[0.2em] font-bold">
                                <th class="pb-6">Item</th>
                                <th class="pb-6">Category</th>
                                <th class="pb-6">Date</th>
                                <th class="pb-6 text-right">Amount</th>
                            </tr>
                        </thead>
                        <tbody id="expenseList" class="text-sm">
                            <!-- Transactions -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-gray-900/60 backdrop-blur-md z-[11000] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-md p-10 shadow-2xl scale-up-center">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-2xl font-bold text-gray-900">New Expense</h3>
                <button onclick="document.getElementById('modal').classList.add('hidden')" class="p-2 hover:bg-gray-100 rounded-full transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            
            <form id="expenseForm" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-wider ml-1">What did you buy?</label>
                    <input type="text" id="desc" required class="w-full px-5 py-4 rounded-2xl bg-gray-50 border-none focus:ring-2 focus:ring-indigo-500 transition-all outline-none" placeholder="e.g. Weekly Groceries">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-400 uppercase tracking-wider ml-1">Amount (₹)</label>
                        <input type="number" id="amt" required class="w-full px-5 py-4 rounded-2xl bg-gray-50 border-none focus:ring-2 focus:ring-indigo-500 transition-all outline-none" placeholder="0.00">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-400 uppercase tracking-wider ml-1">Category</label>
                        <select id="cat" class="w-full px-5 py-4 rounded-2xl bg-gray-50 border-none focus:ring-2 focus:ring-indigo-500 transition-all outline-none">
                            <option>Food</option>
                            <option>Transport</option>
                            <option>Rent</option>
                            <option>Leisure</option>
                            <option>Family</option>
                            <option>Other</option>
                        </select>
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-wider ml-1">Date</label>
                    <input type="date" id="date" required class="w-full px-5 py-4 rounded-2xl bg-gray-50 border-none focus:ring-2 focus:ring-indigo-500 transition-all outline-none">
                </div>
                <button type="submit" class="w-full py-5 bg-indigo-600 text-white rounded-2xl font-bold shadow-xl shadow-indigo-100 hover:bg-indigo-700 active:scale-[0.98] transition-all">Add Transaction</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCpJFhOzhTnmUwiVs3ZvbH17EJdpawcy3k",
            authDomain: "sharexpense-9a5e0.firebaseapp.com",
            projectId: "sharexpense-9a5e0",
            storageBucket: "sharexpense-9a5e0.firebasestorage.app",
            messagingSenderId: "996631717498",
            appId: "1:996631717498:web:e4d1406f23a2220dd3fdc3",
            measurementId: "G-FCKCHC3T57"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let activeUser = null;
        let chart = null;

        // AUTH GUARD: The core mechanism
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                activeUser = user;
                // Pre-fetch profile and setup listeners before showing UI
                await setupDashboard(user);
                document.getElementById('authOverlay').style.display = 'none';
            } else {
                // Not logged in -> Redirect to login.html
                window.location.href = 'login.html';
            }
        });

        async function setupDashboard(user) {
            // UI Profile Update
            const profileRef = doc(db, "User", user.uid);
            const profileSnap = await getDoc(profileRef);
            
            if (profileSnap.exists()) {
                const data = profileSnap.data();
                document.getElementById('welcomeUser').innerText = `Hello, ${data.name.split(' ')[0]}!`;
                if (data.photo) {
                    document.getElementById('userImg').src = data.photo;
                    document.getElementById('userImg').classList.remove('hidden');
                    document.getElementById('userInitials').classList.add('hidden');
                } else {
                    document.getElementById('userInitials').innerText = data.name.charAt(0);
                }
            }

            // Real-time Data Sync
            const q = query(collection(db, "User", user.uid, "expense"), orderBy("date", "desc"));
            onSnapshot(q, (snapshot) => {
                const data = [];
                snapshot.forEach(doc => data.push({ id: doc.id, ...doc.data() }));
                refreshUI(data);
            });
        }

        function refreshUI(expenses) {
            // Table
            const tbody = document.getElementById('expenseList');
            tbody.innerHTML = expenses.map(e => `
                <tr class="border-b border-gray-50 hover:bg-gray-50/50 transition-colors">
                    <td class="py-5 font-semibold text-gray-800">${e.description}</td>
                    <td class="py-5"><span class="px-2.5 py-1 bg-indigo-50 text-indigo-600 rounded-lg text-[10px] font-black uppercase tracking-wider">${e.category}</span></td>
                    <td class="py-5 text-gray-400 text-xs">${new Date(e.date).toLocaleDateString(undefined, {month: 'short', day: 'numeric'})}</td>
                    <td class="py-5 text-right font-bold text-gray-900">₹${parseFloat(e.amount).toLocaleString()}</td>
                </tr>
            `).join('');

            // Data for Chart
            const totals = {};
            expenses.forEach(e => totals[e.category] = (totals[e.category] || 0) + parseFloat(e.amount));
            
            const labels = Object.keys(totals);
            const values = Object.values(totals);
            const palette = ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#3b82f6'];

            if (chart) chart.destroy();
            const ctx = document.getElementById('expenseChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels,
                    datasets: [{ data: values, backgroundColor: palette, borderWidth: 0, cutout: '75%', hoverOffset: 4 }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } }
                }
            });

            // Legend
            const legend = document.getElementById('chartLegend');
            legend.innerHTML = labels.map((l, i) => `
                <div class="flex justify-between items-center group">
                    <div class="flex items-center gap-3">
                        <div class="w-2.5 h-2.5 rounded-full" style="background:${palette[i % palette.length]}"></div>
                        <span class="text-sm font-medium text-gray-500 group-hover:text-gray-900 transition-colors">${l}</span>
                    </div>
                    <span class="text-sm font-bold text-gray-900">₹${values[i].toLocaleString()}</span>
                </div>
            `).join('');
        }

        // Add Logic
        document.getElementById('expenseForm').onsubmit = async (e) => {
            e.preventDefault();
            const expense = {
                description: document.getElementById('desc').value,
                amount: document.getElementById('amt').value,
                category: document.getElementById('cat').value,
                date: document.getElementById('date').value,
                createdAt: new Date().toISOString()
            };

            try {
                await addDoc(collection(db, "User", activeUser.uid, "expense"), expense);
                document.getElementById('modal').classList.add('hidden');
                document.getElementById('expenseForm').reset();
                document.getElementById('date').valueAsDate = new Date();
            } catch (err) {
                console.error("Save Error:", err);
            }
        };

        window.logoutUser = () => {
            signOut(auth).then(() => window.location.href = 'login.html');
        };

        document.getElementById('date').valueAsDate = new Date();
    </script>
</body>
</html>
