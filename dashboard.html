<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sharexpense</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .sidebar-item { @apply flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 rounded-xl transition-all cursor-pointer; }
        .sidebar-item.active { @apply text-white bg-indigo-600 shadow-lg shadow-indigo-500/20; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        
        #authOverlay {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @media (max-width: 1023px) {
            #sidebar { transform: translateX(-100%); position: fixed; z-index: 50; }
            #sidebar.open { transform: translateX(0); }
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex overflow-x-hidden">

    <div id="authOverlay">
        <div class="text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mx-auto"></div>
            <p class="mt-4 text-gray-500 font-medium">Verifying access...</p>
        </div>
    </div>

    <div id="mobileOverlay" onclick="toggleSidebar(false)" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-40 lg:hidden"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 bg-gray-900 text-white flex flex-col p-6 h-screen shrink-0 border-r border-gray-800">
        <div class="flex items-center justify-between mb-8 px-2">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                </div>
                <h1 class="text-xl font-bold tracking-tight">Sharexpense</h1>
            </div>
            <button onclick="toggleSidebar(false)" class="lg:hidden text-gray-400">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>

        <nav class="flex-grow space-y-1 overflow-y-auto pr-2">
            <div onclick="window.location.reload()" class="sidebar-item active">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                <span>Overview</span>
            </div>
            
            <div class="sidebar-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4"/></svg>
                <span>Room</span>
            </div>
            <div class="sidebar-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82"/></svg>
                <span>Settings</span>
            </div>

            <div class="mt-8 pt-4 border-t border-gray-800">
                <p class="text-[10px] uppercase tracking-[0.2em] text-gray-500 font-bold mb-4 px-2">Collections</p>
                <div id="collectionsList" class="space-y-1">
                    <div id="defaultColItem" onclick="window.switchCollection('expense', 'General', 'manual')" class="sidebar-item active" data-id="expense">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                        <span>General</span>
                    </div>
                </div>
                <button onclick="openNewCollectionModal()" class="sidebar-item w-full mt-2 text-indigo-400 border border-indigo-400/20 bg-indigo-400/5">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    <span>New List</span>
                </button>
            </div>
        </nav>

        <div class="pt-6 border-t border-gray-800">
            <button onclick="window.logoutUser()" class="sidebar-item w-full text-red-400 hover:bg-red-950/30">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                <span>Log out</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-grow flex flex-col h-screen overflow-hidden">
        <header class="lg:hidden bg-white border-b border-gray-100 p-4 flex items-center justify-between shrink-0">
            <button onclick="toggleSidebar(true)" class="p-2 bg-gray-50 rounded-lg text-gray-600">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <h1 class="font-bold text-gray-800">Sharexpense</h1>
            <div id="userInitialsMobile" class="w-8 h-8 bg-indigo-600 text-white rounded-full flex items-center justify-center text-xs font-bold uppercase">?</div>
        </header>

        <main class="flex-grow overflow-y-auto p-4 md:p-8">
            <div class="max-w-7xl mx-auto">
                <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
                    <div>
                        <h2 class="text-3xl font-bold text-gray-800" id="welcomeUser">Hello!</h2>
                        <p class="text-gray-500" id="currentCollectionText">Default General Expenses</p>
                    </div>
                    <div class="flex items-center gap-4 w-full md:w-auto">
                        <button id="addExpenseBtn" onclick="document.getElementById('modal').classList.remove('hidden')" class="flex-grow md:flex-none bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all flex items-center justify-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                            Add Expense
                        </button>
                        <div class="hidden md:flex w-12 h-12 rounded-2xl bg-white shadow-sm border border-gray-100 items-center justify-center overflow-hidden">
                            <img id="userImg" src="" alt="Profile" class="hidden w-full h-full object-cover">
                            <span id="userInitials" class="text-indigo-600 font-bold text-lg uppercase">?</span>
                        </div>
                    </div>
                </header>

                <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                    <div class="lg:col-span-4 glass-card p-8 rounded-[2rem] shadow-sm flex flex-col">
                        <h3 class="font-bold text-gray-800 text-lg mb-6">Spending Analysis</h3>
                        <div class="relative flex-grow min-h-[250px]">
                            <canvas id="expenseChart"></canvas>
                        </div>
                        <div id="chartLegend" class="mt-8 space-y-3"></div>
                    </div>

                    <div class="lg:col-span-8 glass-card p-8 rounded-[2rem] shadow-sm">
                        <h3 class="font-bold text-gray-800 text-lg mb-6">Transactions</h3>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead>
                                    <tr class="text-gray-400 text-[10px] uppercase tracking-[0.2em] font-bold border-b border-gray-50">
                                        <th class="pb-6">Item</th>
                                        <th class="pb-6">Category</th>
                                        <th class="pb-6">Date</th>
                                        <th class="pb-6 text-right">Amount</th>
                                    </tr>
                                </thead>
                                <tbody id="expenseList" class="text-sm"></tbody>
                            </table>
                            <div id="emptyState" class="hidden py-20 text-center text-gray-400 italic">This collection is currently empty.</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Expense Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-gray-900/60 backdrop-blur-md z-[11000] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-md p-10 shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-2xl font-bold text-gray-900">New Expense</h3>
                <button onclick="document.getElementById('modal').classList.add('hidden')" class="p-2 hover:bg-gray-100 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <form id="expenseForm" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-400 uppercase">Description</label>
                    <input type="text" id="desc" required class="w-full px-5 py-4 rounded-2xl bg-gray-50 border-none focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-400 uppercase">Amount (₹)</label>
                        <input type="number" id="amt" required class="w-full px-5 py-4 rounded-2xl bg-gray-50 border-none focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-400 uppercase">Category</label>
                        <!-- Updated onchange for immediate redirection -->
                        <select id="cat" onchange="if(this.value==='ADD_NEW') window.location.href='rules.html'" class="w-full px-5 py-4 rounded-2xl bg-gray-50 border-none focus:ring-2 focus:ring-indigo-500 outline-none"></select>
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-400 uppercase">Date</label>
                    <input type="date" id="date" required class="w-full px-5 py-4 rounded-2xl bg-gray-50 border-none focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <button type="submit" class="w-full py-5 bg-indigo-600 text-white rounded-2xl font-bold shadow-xl hover:bg-indigo-700 transition-all">Save Transaction</button>
            </form>
        </div>
    </div>

    <!-- Collection Modal -->
    <div id="collectionModal" class="hidden fixed inset-0 bg-gray-900/60 backdrop-blur-md z-[11000] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-md p-10 shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-2xl font-bold text-gray-900">New List</h3>
                <button onclick="document.getElementById('collectionModal').classList.add('hidden')" class="p-2 hover:bg-gray-100 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <form id="collectionForm" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-400 uppercase">List Name</label>
                    <input type="text" id="colName" required class="w-full px-5 py-4 rounded-2xl bg-gray-50 border-none focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="e.g. Goa Trip">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-wider ml-1">Entry Type</label>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="cursor-pointer border-2 border-transparent p-4 bg-gray-50 rounded-2xl text-center has-[:checked]:border-indigo-600 has-[:checked]:bg-indigo-50 transition-all">
                            <input type="radio" name="colType" value="manual" checked class="hidden">
                            <span class="block font-bold text-sm">Manual</span>
                            <span class="text-[10px] text-gray-500">Regular Entry</span>
                        </label>
                        <label class="cursor-pointer border-2 border-transparent p-4 bg-gray-50 rounded-2xl text-center has-[:checked]:border-indigo-600 has-[:checked]:bg-indigo-50 transition-all">
                            <input type="radio" name="colType" value="auto" class="hidden">
                            <span class="block font-bold text-sm">Auto</span>
                            <span class="text-[10px] text-gray-500">Excel Upload</span>
                        </label>
                    </div>
                </div>
                <button type="submit" class="w-full py-5 bg-indigo-600 text-white rounded-2xl font-bold shadow-xl hover:bg-indigo-700">Create Sub-collection</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCpJFhOzhTnmUwiVs3ZvbH17EJdpawcy3k",
            authDomain: "sharexpense-9a5e0.firebaseapp.com",
            projectId: "sharexpense-9a5e0",
            storageBucket: "sharexpense-9a5e0.firebasestorage.app",
            messagingSenderId: "996631717498",
            appId: "1:996631717498:web:e4d1406f23a2220dd3fdc3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let activeUser = null;
        let activeCollection = 'expense';
        let chart = null;
        let unsubscribeExpenses = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                activeUser = user;
                await initDashboard(user);
                document.getElementById('authOverlay').style.display = 'none';
            } else {
                window.location.href = 'login.html';
            }
        });

        async function initDashboard(user) {
            const profileSnap = await getDoc(doc(db, "User", user.uid));
            if (profileSnap.exists()) {
                const data = profileSnap.data();
                document.getElementById('welcomeUser').innerText = `Hello, ${data.name.split(' ')[0]}!`;
                document.getElementById('userInitials').innerText = data.name.charAt(0);
                document.getElementById('userInitialsMobile').innerText = data.name.charAt(0);
                if (data.photo) {
                    document.getElementById('userImg').src = data.photo;
                    document.getElementById('userImg').classList.remove('hidden');
                    document.getElementById('userInitials').classList.add('hidden');
                }
            }

            // Sync Categories
            onSnapshot(collection(db, "User", user.uid, "Catagory"), (snapshot) => {
                const catSelect = document.getElementById('cat');
                catSelect.innerHTML = '';
                
                if (snapshot.empty) {
                    const opt = document.createElement('option');
                    opt.value = "Misc"; opt.textContent = "Misc";
                    catSelect.appendChild(opt);
                } else {
                    snapshot.forEach(doc => {
                        const opt = document.createElement('option');
                        opt.value = doc.data().name || doc.id;
                        opt.textContent = doc.data().name || doc.id;
                        catSelect.appendChild(opt);
                    });
                }
                
                // Redirection trigger option
                const addOpt = document.createElement('option');
                addOpt.value = "ADD_NEW"; 
                addOpt.textContent = "+ Manage Categories";
                addOpt.className = "text-indigo-600 font-bold";
                catSelect.appendChild(addOpt);
            });

            // Metadata Sync for Sidebar
            onSnapshot(collection(db, "User", user.uid, "CollectionsMetadata"), (snapshot) => {
                const list = document.getElementById('collectionsList');
                const defaultItem = document.getElementById('defaultColItem');
                list.innerHTML = '';
                list.appendChild(defaultItem);

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const div = document.createElement('div');
                    div.className = `sidebar-item ${activeCollection === doc.id ? 'active' : ''}`;
                    div.dataset.id = doc.id;
                    div.onclick = () => window.switchCollection(doc.id, data.name, data.type);
                    div.innerHTML = `
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                        <span>${data.name}</span>
                        ${data.type === 'auto' ? '<span class="ml-auto text-[8px] bg-indigo-500/20 text-indigo-400 px-1 rounded">AUTO</span>' : ''}
                    `;
                    list.appendChild(div);
                });
            });

            window.switchCollection('expense', 'General', 'manual');
        }

        window.switchCollection = (colId, name = 'General', type = 'manual') => {
            activeCollection = colId;
            document.getElementById('currentCollectionText').innerText = `${name} (${type})`;
            
            const addBtn = document.getElementById('addExpenseBtn');
            if (type === 'auto') {
                addBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> Upload Sheet`;
                addBtn.onclick = () => alert('Excel Import logic would go here.');
            } else {
                addBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add Expense`;
                addBtn.onclick = () => document.getElementById('modal').classList.remove('hidden');
            }

            if (unsubscribeExpenses) unsubscribeExpenses();

            document.querySelectorAll('.sidebar-item').forEach(el => {
                el.classList.toggle('active', el.dataset.id === colId);
            });

            const q = query(collection(db, "User", activeUser.uid, colId), orderBy("date", "desc"));
            unsubscribeExpenses = onSnapshot(q, (snapshot) => {
                const data = [];
                snapshot.forEach(doc => data.push({ id: doc.id, ...doc.data() }));
                refreshExpensesUI(data);
            }, (err) => console.error("Query Error:", err));

            if (window.innerWidth < 1024) toggleSidebar(false);
        };

        function refreshExpensesUI(expenses) {
            const tbody = document.getElementById('expenseList');
            const empty = document.getElementById('emptyState');
            
            if (expenses.length === 0) {
                tbody.innerHTML = '';
                empty.classList.remove('hidden');
            } else {
                empty.classList.add('hidden');
                tbody.innerHTML = expenses.map(e => `
                    <tr class="border-b border-gray-50 hover:bg-gray-50/50 transition-colors">
                        <td class="py-5 font-semibold text-gray-800">${e.description}</td>
                        <td class="py-5"><span class="px-2.5 py-1 bg-indigo-50 text-indigo-600 rounded-lg text-[10px] font-black uppercase">${e.category}</span></td>
                        <td class="py-5 text-gray-400 text-xs">${new Date(e.date).toLocaleDateString(undefined, {month: 'short', day: 'numeric'})}</td>
                        <td class="py-5 text-right font-bold text-gray-900">₹${parseFloat(e.amount).toLocaleString()}</td>
                    </tr>
                `).join('');
            }
            updateChart(expenses);
        }

        function updateChart(expenses) {
            const totals = {};
            expenses.forEach(e => totals[e.category] = (totals[e.category] || 0) + parseFloat(e.amount));
            const labels = Object.keys(totals);
            const values = Object.values(totals);
            const palette = ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#3b82f6'];

            if (chart) chart.destroy();
            const ctx = document.getElementById('expenseChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels,
                    datasets: [{ data: values, backgroundColor: palette, borderWidth: 0, cutout: '75%', hoverOffset: 4 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            const legend = document.getElementById('chartLegend');
            legend.innerHTML = labels.map((l, i) => `
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <div class="w-2.5 h-2.5 rounded-full" style="background:${palette[i % palette.length]}"></div>
                        <span class="text-sm font-medium text-gray-500">${l}</span>
                    </div>
                    <span class="text-sm font-bold text-gray-900">₹${values[i].toLocaleString()}</span>
                </div>
            `).join('');
        }

        window.toggleSidebar = (show) => {
            const sb = document.getElementById('sidebar');
            const overlay = document.getElementById('mobileOverlay');
            sb.classList.toggle('open', show);
            overlay.classList.toggle('hidden', !show);
        };

        window.openNewCollectionModal = () => {
            document.getElementById('collectionModal').classList.remove('hidden');
        };

        document.getElementById('expenseForm').onsubmit = async (e) => {
            e.preventDefault();
            const cat = document.getElementById('cat').value;
            if (cat === "ADD_NEW") return;

            const data = {
                description: document.getElementById('desc').value,
                amount: document.getElementById('amt').value,
                category: cat,
                date: document.getElementById('date').value,
                createdAt: new Date().toISOString()
            };

            await addDoc(collection(db, "User", activeUser.uid, activeCollection), data);
            document.getElementById('modal').classList.add('hidden');
            e.target.reset();
            document.getElementById('date').valueAsDate = new Date();
        };

        document.getElementById('collectionForm').onsubmit = async (e) => {
            e.preventDefault();
            const rawName = document.getElementById('colName').value.trim();
            const type = document.querySelector('input[name="colType"]:checked').value;
            
            const metadataId = rawName.toLowerCase().replace(/\s+/g, '_') + '_' + Date.now();

            await setDoc(doc(db, "User", activeUser.uid, "CollectionsMetadata", metadataId), { 
                name: rawName, 
                type: type 
            });

            document.getElementById('collectionModal').classList.add('hidden');
            e.target.reset();
            window.switchCollection(rawName, rawName, type);
        };

        window.logoutUser = () => signOut(auth).then(() => window.location.href = 'login.html');
        document.getElementById('date').valueAsDate = new Date();
    </script>
</body>
</html>
