<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sharexpense</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .sidebar-item { @apply flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 rounded-xl transition-all cursor-pointer; }
        .sidebar-item.active { @apply text-white bg-indigo-600 shadow-lg shadow-indigo-500/20; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        
        #authOverlay {
            position: fixed; inset: 0; background: white; z-index: 10000;
            display: flex; align-items: center; justify-content: center;
        }

        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @media (max-width: 1023px) {
            #sidebar { transform: translateX(-100%); position: fixed; z-index: 50; }
            #sidebar.open { transform: translateX(0); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex overflow-x-hidden">

    <div id="authOverlay">
        <div class="text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mx-auto"></div>
            <p class="mt-4 text-gray-500 font-medium">Authenticating...</p>
        </div>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar" class="w-72 bg-gray-900 text-white flex flex-col p-6 h-screen shrink-0">
        <div class="flex items-center gap-3 mb-10 px-2">
            <div class="bg-indigo-600 p-2 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            </div>
            <h1 class="text-xl font-bold tracking-tight">Sharexpense</h1>
        </div>

        <nav class="space-y-2 flex-grow">
            <div class="sidebar-item active">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                <span>Dashboard</span>
            </div>
            <div onclick="window.location.href='rooms.html'" class="sidebar-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <span>Rooms</span>
            </div>
        </nav>

        <div class="pt-6 border-t border-gray-800">
            <button onclick="window.logoutUser()" class="sidebar-item w-full text-red-400 hover:bg-red-950/30">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                <span>Log out</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col h-screen overflow-hidden">
        <header class="bg-white border-b border-gray-100 p-6 flex items-center justify-between">
            <h2 id="currentCollectionName" class="text-2xl font-bold text-gray-800">Expenses</h2>
            <div class="flex gap-3">
                <button onclick="document.getElementById('modal').classList.remove('hidden')" class="px-5 py-2.5 bg-indigo-600 text-white font-bold rounded-xl shadow-lg hover:bg-indigo-700 transition-all flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add Expense
                </button>
            </div>
        </header>

        <div class="p-8 overflow-y-auto">
            <!-- Summary Grid -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                    <p class="text-sm font-medium text-gray-400 mb-1">Total Spent</p>
                    <h3 id="totalAmount" class="text-3xl font-bold text-gray-800">$0.00</h3>
                </div>
            </div>

            <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="p-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Date</th>
                            <th class="p-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Description</th>
                            <th class="p-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Category</th>
                            <th class="p-4 text-xs font-bold text-gray-500 uppercase tracking-wider text-right">Amount</th>
                        </tr>
                    </thead>
                    <tbody id="expenseTable" class="divide-y divide-gray-50"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Add Expense Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-gray-900/60 backdrop-blur-md z-[11000] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] w-full max-w-md p-8 shadow-2xl">
            <h3 class="text-2xl font-bold mb-6 text-gray-800">New Transaction</h3>
            <form id="expenseForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Description</label>
                    <input type="text" id="desc" required class="w-full p-4 rounded-xl bg-gray-50 border-none focus:ring-2 focus:ring-indigo-500" placeholder="e.g. Groceries">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Amount</label>
                        <input type="number" step="0.01" id="amt" required class="w-full p-4 rounded-xl bg-gray-50 border-none focus:ring-2 focus:ring-indigo-500" placeholder="0.00">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Date</label>
                        <input type="date" id="date" required class="w-full p-4 rounded-xl bg-gray-50 border-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Category</label>
                    <select id="cat" required class="w-full p-4 rounded-xl bg-gray-50 border-none focus:ring-2 focus:ring-indigo-500"></select>
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="document.getElementById('modal').classList.add('hidden')" class="flex-1 p-4 bg-gray-100 text-gray-600 rounded-xl font-bold hover:bg-gray-200 transition-all">Cancel</button>
                    <button type="submit" class="flex-1 p-4 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-500/30 transition-all">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCpJFhOzhTnmUwiVs3ZvbH17EJdpawcy3k",
            authDomain: "sharexpense-9a5e0.firebaseapp.com",
            projectId: "sharexpense-9a5e0",
            storageBucket: "sharexpense-9a5e0.firebasestorage.app",
            messagingSenderId: "996631717498",
            appId: "1:996631717498:web:e4d1406f23a2220dd3fdc3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let activeUser = null;
        let activeCollection = "expense";
        let tableUnsubscribe = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                activeUser = user;
                document.getElementById('authOverlay').style.display = 'none';
                loadCategories();
                setupTableListener();
            } else {
                window.location.href = 'login.html';
            }
        });

        async function loadCategories() {
            const catSelect = document.getElementById('cat');
            catSelect.innerHTML = '<option value="">Select Category</option>';
            try {
                const snap = await getDocs(collection(db, "User", activeUser.uid, "Catagory"));
                snap.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.data().name;
                    opt.textContent = d.data().name;
                    catSelect.appendChild(opt);
                });
            } catch (e) {
                console.error("Error loading categories", e);
            }
        }

        function setupTableListener() {
            if (tableUnsubscribe) tableUnsubscribe();
            
            const q = query(collection(db, "User", activeUser.uid, activeCollection), orderBy("date", "desc"));
            
            tableUnsubscribe = onSnapshot(q, (snapshot) => {
                const table = document.getElementById('expenseTable');
                let total = 0;
                table.innerHTML = '';
                
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const amount = parseFloat(data.amount) || 0;
                    total += amount;
                    
                    const row = `
                        <tr>
                            <td class="p-4 text-sm text-gray-600 font-medium">${data.date}</td>
                            <td class="p-4 text-sm text-gray-800 font-bold">${data.description}</td>
                            <td class="p-4"><span class="px-3 py-1 bg-indigo-50 text-indigo-600 text-[10px] font-bold uppercase rounded-full">${data.category}</span></td>
                            <td class="p-4 text-sm font-black text-gray-900 text-right">$${amount.toFixed(2)}</td>
                        </tr>
                    `;
                    table.innerHTML += row;
                });
                
                document.getElementById('totalAmount').innerText = `$${total.toFixed(2)}`;
            }, (err) => {
                console.error("Listener error:", err);
            });
        }

        document.getElementById('expenseForm').onsubmit = async (e) => {
            e.preventDefault();
            if (!activeUser) return;

            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.innerText = 'Saving...';

            const data = {
                description: document.getElementById('desc').value,
                amount: parseFloat(document.getElementById('amt').value),
                category: document.getElementById('cat').value,
                date: document.getElementById('date').value,
                createdAt: new Date().toISOString()
            };

            try {
                await addDoc(collection(db, "User", activeUser.uid, activeCollection), data);
                document.getElementById('modal').classList.add('hidden');
                e.target.reset();
                document.getElementById('date').valueAsDate = new Date();
            } catch (err) {
                console.error("Save error:", err);
                alert("Failed to save expense. Check console for details.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Save';
            }
        };

        window.logoutUser = () => signOut(auth).then(() => window.location.href = 'login.html');
        document.getElementById('date').valueAsDate = new Date();
    </script>
</body>
</html>
