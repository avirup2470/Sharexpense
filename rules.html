<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rules Configuration - Sharexpense</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .rule-card { @apply bg-white p-6 rounded-2xl shadow-sm border border-gray-100 transition-all hover:shadow-md; }
        .input-field { @apply mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2.5 border; }
        .badge { @apply inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        
        #authOverlay {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-20 font-sans">

    <!-- Auth Guard Overlay -->
    <div id="authOverlay">
        <div class="text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mx-auto"></div>
            <p class="mt-4 text-gray-500 font-medium">Loading Rule Engine...</p>
        </div>
    </div>

    <nav class="bg-white border-b border-gray-200 px-6 py-4 mb-8 sticky top-0 z-10">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <button onclick="window.location.href='dashboard.html'" class="p-2 hover:bg-gray-100 rounded-lg text-gray-500">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                <h1 class="text-xl font-bold text-gray-800">Classification Rules</h1>
            </div>
            <div class="flex gap-2">
                <button id="saveBtn" class="text-sm px-6 py-2 bg-indigo-600 text-white font-bold rounded-lg shadow-sm hover:bg-indigo-700 transition-all flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                    Save to Cloud
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6">
        
        <!-- Instructions -->
        <div class="bg-indigo-50 border border-indigo-100 rounded-2xl p-6 mb-8 flex items-start gap-4">
            <div class="text-indigo-600 mt-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
            </div>
            <div>
                <h3 class="font-bold text-indigo-900">Priority & Auto-Segregation</h3>
                <p class="text-sm text-indigo-700 mt-1 leading-relaxed">
                    Rules are processed by <b>Priority</b> (lowest number first). If a transaction matches multiple rules, the one with the higher priority (lower number) takes precedence.
                </p>
            </div>
        </div>

        <!-- Rules List -->
        <div id="rulesContainer" class="space-y-6">
            <!-- Rules will be injected here -->
        </div>

        <!-- Add New Rule Button -->
        <button id="addRuleBtn" class="mt-8 w-full py-4 border-2 border-dashed border-gray-300 rounded-2xl text-gray-500 font-medium hover:border-indigo-400 hover:text-indigo-600 hover:bg-white transition-all flex items-center justify-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Define New Category Rule
        </button>

    </main>

    <!-- Template for a Rule -->
    <template id="ruleTemplate">
        <div class="rule-card group relative">
            <div class="flex justify-between items-start mb-6">
                <div class="flex-grow grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="md:col-span-1">
                        <label class="text-[10px] font-bold uppercase text-gray-400 tracking-wider">Category Name</label>
                        <input type="text" class="input-field rule-name" placeholder="e.g., Grocery">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold uppercase text-gray-400 tracking-wider">Priority (Order)</label>
                        <input type="number" class="input-field rule-priority" placeholder="1" value="1">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold uppercase text-gray-400 tracking-wider">Logic Operator</label>
                        <select class="input-field rule-operator">
                            <option value="OR">OR (Any match)</option>
                            <option value="AND">AND (All match)</option>
                            <option value="NOT">NOT (Exclude if match)</option>
                        </select>
                    </div>
                </div>
                <button class="remove-btn ml-4 p-2 text-gray-300 hover:text-red-500 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                </button>
            </div>

            <div class="mb-6">
                <label class="text-[10px] font-bold uppercase text-gray-400 tracking-wider">Keywords (comma separated)</label>
                <input type="text" class="input-field rule-keywords" placeholder="swiggy, zomato, blinkit...">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-bold uppercase text-gray-400 tracking-wider">Min Amount (₹)</label>
                    <input type="number" class="input-field rule-min" placeholder="0">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase text-gray-400 tracking-wider">Max Amount (₹)</label>
                    <input type="number" class="input-field rule-max" placeholder="No limit">
                </div>
            </div>
        </div>
    </template>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, collection, setDoc, getDocs, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCpJFhOzhTnmUwiVs3ZvbH17EJdpawcy3k",
            authDomain: "sharexpense-9a5e0.firebaseapp.com",
            projectId: "sharexpense-9a5e0",
            storageBucket: "sharexpense-9a5e0.firebasestorage.app",
            messagingSenderId: "996631717498",
            appId: "1:996631717498:web:e4d1406f23a2220dd3fdc3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let activeUser = null;
        const container = document.getElementById('rulesContainer');

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                activeUser = user;
                await loadRules();
                document.getElementById('authOverlay').style.display = 'none';
            } else {
                window.location.href = 'login.html';
            }
        });

        async function loadRules() {
            const catCol = collection(db, "User", activeUser.uid, "Catagory");
            const snapshot = await getDocs(catCol);
            
            container.innerHTML = '';
            if (snapshot.empty) {
                // Add first blank rule if empty
                addNewRule();
            } else {
                const rules = [];
                snapshot.forEach(doc => rules.push({ id: doc.id, ...doc.data() }));
                // Sort by priority locally
                rules.sort((a, b) => (a.priority || 99) - (b.priority || 99));
                rules.forEach(rule => addNewRule(rule));
            }
        }

        function addNewRule(data = {}) {
            const temp = document.getElementById('ruleTemplate');
            const clone = temp.content.cloneNode(true);
            const card = clone.querySelector('.rule-card');
            
            card.querySelector('.rule-name').value = data.name || '';
            card.querySelector('.rule-priority').value = data.priority || (container.children.length + 1);
            card.querySelector('.rule-operator').value = data.operator || 'OR';
            card.querySelector('.rule-keywords').value = data.keywords || '';
            card.querySelector('.rule-min').value = data.min || 0;
            card.querySelector('.rule-max').value = data.max || '';
            
            card.querySelector('.remove-btn').onclick = () => card.remove();
            
            container.appendChild(card);
        }

        document.getElementById('addRuleBtn').onclick = () => addNewRule();

        document.getElementById('saveBtn').onclick = async () => {
            if (!activeUser) return;
            
            const btn = document.getElementById('saveBtn');
            const originalHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerText = "Saving...";

            const cards = container.querySelectorAll('.rule-card');
            const batch = writeBatch(db);
            const catCol = collection(db, "User", activeUser.uid, "Catagory");

            // 1. Delete existing rules to ensure clean sync (Firestore doesn't have a simple replace collection)
            const oldDocs = await getDocs(catCol);
            oldDocs.forEach(d => batch.delete(d.ref));

            // 2. Add new rules
            cards.forEach(card => {
                const name = card.querySelector('.rule-name').value.trim();
                if (!name) return;

                const ruleData = {
                    name: name,
                    priority: parseInt(card.querySelector('.rule-priority').value) || 99,
                    operator: card.querySelector('.rule-operator').value,
                    keywords: card.querySelector('.rule-keywords').value,
                    min: parseFloat(card.querySelector('.rule-min').value) || 0,
                    max: card.querySelector('.rule-max').value ? parseFloat(card.querySelector('.rule-max').value) : null,
                    updatedAt: new Date().toISOString()
                };

                // Use the name as the Document ID to ensure uniqueness
                const docRef = doc(catCol, name);
                batch.set(docRef, ruleData);
            });

            try {
                await batch.commit();
                btn.innerHTML = "✓ Saved Successfully";
                btn.classList.replace('bg-indigo-600', 'bg-green-600');
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.classList.replace('bg-green-600', 'bg-indigo-600');
                    btn.disabled = false;
                }, 2000);
            } catch (err) {
                console.error(err);
                btn.innerText = "Error Saving";
                btn.classList.replace('bg-indigo-600', 'bg-red-600');
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.classList.replace('bg-red-600', 'bg-indigo-600');
                    btn.disabled = false;
                }, 3000);
            }
        };
    </script>
</body>
</html>
