<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rooms - Sharexpense</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sidebar-item { @apply flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 rounded-xl transition-all cursor-pointer; }
        .sidebar-item.active { @apply text-white bg-indigo-600 shadow-lg shadow-indigo-500/20; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        
        #authOverlay {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @media (max-width: 1023px) {
            #sidebar { transform: translateX(-100%); position: fixed; z-index: 50; }
            #sidebar.open { transform: translateX(0); }
        }

        .room-card { @apply bg-white p-6 rounded-[2rem] border border-gray-100 hover:shadow-xl hover:-translate-y-1 transition-all cursor-pointer flex flex-col justify-between; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex overflow-x-hidden">

    <div id="authOverlay">
        <div class="text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mx-auto"></div>
            <p class="mt-4 text-gray-500 font-medium">Loading your rooms...</p>
        </div>
    </div>

    <div id="mobileOverlay" onclick="toggleSidebar(false)" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-40 lg:hidden"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 bg-gray-900 text-white flex flex-col p-6 h-screen shrink-0 border-r border-gray-800">
        <div class="flex items-center justify-between mb-8 px-2">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                </div>
                <h1 class="text-xl font-bold tracking-tight">Sharexpense</h1>
            </div>
            <button onclick="toggleSidebar(false)" class="lg:hidden text-gray-400">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>

        <nav class="flex-grow space-y-1 overflow-y-auto pr-2">
            <div onclick="window.location.href='dashboard.html'" class="sidebar-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                <span>Overview</span>
            </div>

            <div onclick="window.location.reload()" class="sidebar-item active">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span>Rooms</span>
            </div>
        </nav>

        <div class="pt-6 border-t border-gray-800">
            <button onclick="window.logoutUser()" class="sidebar-item w-full text-red-400 hover:bg-red-950/30">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                <span>Log out</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-grow flex flex-col h-screen overflow-hidden">
        <header class="bg-white border-b border-gray-100 p-6 flex items-center justify-between shrink-0">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar(true)" class="lg:hidden p-2 bg-gray-50 rounded-lg text-gray-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <h1 class="text-2xl font-bold text-gray-800">Shared Rooms</h1>
            </div>
            
            <div class="flex items-center gap-3">
                <button onclick="openJoinModal()" class="px-4 py-2 text-indigo-600 font-bold hover:bg-indigo-50 rounded-xl transition-all">Join Room</button>
                <button onclick="openCreateModal()" class="px-6 py-2 bg-indigo-600 text-white font-bold rounded-xl shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all">Create Room</button>
            </div>
        </header>

        <main class="flex-grow overflow-y-auto p-6 md:p-10">
            <div class="max-w-6xl mx-auto">
                <div id="roomsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- Rooms will be injected here -->
                </div>
                
                <div id="noRoomsState" class="hidden flex flex-col items-center justify-center py-20 text-center">
                    <div class="bg-gray-100 p-8 rounded-full mb-6">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    </div>
                    <h3 class="text-xl font-bold text-gray-800 mb-2">You have no rooms</h3>
                    <p class="text-gray-500 max-w-xs mx-auto">Create a room to start sharing expenses with friends or join an existing one.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Create Room Modal -->
    <div id="createModal" class="hidden fixed inset-0 bg-gray-900/60 backdrop-blur-md z-[11000] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-md p-10 shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-2xl font-bold text-gray-900">Create New Room</h3>
                <button onclick="closeModals()" class="p-2 hover:bg-gray-100 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <form id="createRoomForm" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-400 uppercase">Room Name</label>
                    <input type="text" id="newRoomName" required class="w-full px-5 py-4 rounded-2xl bg-gray-50 border-none focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="e.g. Flatmates, Road Trip">
                </div>
                <button type="submit" class="w-full py-5 bg-indigo-600 text-white rounded-2xl font-bold shadow-xl hover:bg-indigo-700 transition-all">Create Room</button>
            </form>
        </div>
    </div>

    <!-- Join Room Modal -->
    <div id="joinModal" class="hidden fixed inset-0 bg-gray-900/60 backdrop-blur-md z-[11000] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-md p-10 shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-2xl font-bold text-gray-900">Join a Room</h3>
                <button onclick="closeModals()" class="p-2 hover:bg-gray-100 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <form id="joinRoomForm" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-400 uppercase">Room Code</label>
                    <input type="text" id="roomCodeInput" required class="w-full px-5 py-4 rounded-2xl bg-gray-50 border-none focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Enter the 6-digit code">
                </div>
                <button type="submit" class="w-full py-5 bg-indigo-600 text-white rounded-2xl font-bold shadow-xl hover:bg-indigo-700 transition-all">Join Room</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, query, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCpJFhOzhTnmUwiVs3ZvbH17EJdpawcy3k",
            authDomain: "sharexpense-9a5e0.firebaseapp.com",
            projectId: "sharexpense-9a5e0",
            storageBucket: "sharexpense-9a5e0.firebasestorage.app",
            messagingSenderId: "996631717498",
            appId: "1:996631717498:web:e4d1406f23a2220dd3fdc3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let activeUser = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                activeUser = user;
                initRooms(user);
                document.getElementById('authOverlay').style.display = 'none';
            } else {
                window.location.href = 'login.html';
            }
        });

        function initRooms(user) {
            const roomsRef = collection(db, "User", user.uid, "rooms");
            onSnapshot(roomsRef, (snapshot) => {
                const grid = document.getElementById('roomsGrid');
                const empty = document.getElementById('noRoomsState');
                grid.innerHTML = '';

                if (snapshot.empty) {
                    empty.classList.remove('hidden');
                } else {
                    empty.classList.add('hidden');
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        const card = document.createElement('div');
                        card.className = 'room-card';
                        card.onclick = () => window.location.href = `room_details.html?id=${doc.id}`;
                        card.innerHTML = `
                            <div>
                                <div class="flex items-start justify-between mb-4">
                                    <div class="bg-indigo-50 p-3 rounded-2xl text-indigo-600">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                                    </div>
                                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Shared Room</span>
                                </div>
                                <h3 class="text-xl font-bold text-gray-800 mb-1">${data.name || 'Unnamed Room'}</h3>
                                <p class="text-xs text-gray-400 font-medium">Code: <span class="text-indigo-600 font-bold">${data.code || 'N/A'}</span></p>
                            </div>
                            <div class="mt-8 flex items-center justify-between">
                                <div class="flex -space-x-2">
                                    <div class="w-8 h-8 rounded-full border-2 border-white bg-gray-200 flex items-center justify-center text-[10px] font-bold">U</div>
                                </div>
                                <span class="text-xs font-bold text-indigo-600">View Details &rarr;</span>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                }
            });
        }

        window.openCreateModal = () => document.getElementById('createModal').classList.remove('hidden');
        window.openJoinModal = () => document.getElementById('joinModal').classList.remove('hidden');
        window.closeModals = () => {
            document.getElementById('createModal').classList.add('hidden');
            document.getElementById('joinModal').classList.add('hidden');
        };

        document.getElementById('createRoomForm').onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('newRoomName').value;
            const code = Math.floor(100000 + Math.random() * 900000).toString(); // Simple 6-digit code
            
            try {
                // Add to user's local rooms list
                await addDoc(collection(db, "User", activeUser.uid, "rooms"), {
                    name,
                    code,
                    role: 'admin',
                    createdAt: serverTimestamp()
                });
                
                // Note: In a real production app, you'd also create a global "Rooms" collection 
                // to facilitate joining via code. This implementation focuses on the User's subcollection.
                
                closeModals();
                e.target.reset();
            } catch (err) {
                console.error("Error creating room:", err);
            }
        };

        document.getElementById('joinRoomForm').onsubmit = async (e) => {
            e.preventDefault();
            const code = document.getElementById('roomCodeInput').value;
            // logic to check global room codes and add to User/UID/rooms would go here
            console.log("Joining room with code:", code);
            closeModals();
            e.target.reset();
        };

        window.toggleSidebar = (show) => {
            document.getElementById('sidebar').classList.toggle('open', show);
            document.getElementById('mobileOverlay').classList.toggle('hidden', !show);
        };

        window.logoutUser = () => signOut(auth).then(() => window.location.href = 'login.html');
    </script>
</body>
</html>
